version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: cybertrace_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - osint_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybertrace_flask
    ports:
      - "5000:5000"
    env_file:
      - .env.osint
    environment:
      - FLASK_ENV=production
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - osint_net

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybertrace_celery_worker
    command: celery -A app.celery_worker.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env.osint
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - osint_net

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: cybertrace_react_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - osint_net

networks:
  osint_net:
    driver: bridge

volumes:
  redis_data:
